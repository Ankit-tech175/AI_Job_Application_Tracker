<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Dashboard</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>

<body>

<div class="container mt-5">

    <!-- Dashboard Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            Job Application Dashboard
        </h2>

        <button
            class="btn btn-danger"
            onclick="logoutUser()"
        >
            Logout
        </button>

    </div>

    <!-- Analytics Cards -->
<div class="row mb-4">

    <!-- Total Applications -->
    <div class="col-md-3">

        <div class="card shadow-sm text-center p-3">

            <h5>Total Applications</h5>

            <h2 id="totalApplications">
                0
            </h2>

        </div>

    </div>

    <!-- Applied -->
    <div class="col-md-3">

        <div class="card shadow-sm text-center p-3">

            <h5>Applied</h5>

            <h2 id="appliedCount">
                0
            </h2>

        </div>

    </div>

    <!-- Interviews -->
    <div class="col-md-3">

        <div class="card shadow-sm text-center p-3">

            <h5>Interviews</h5>

            <h2 id="interviewCount">
                0
            </h2>

        </div>

    </div>

    <!-- Offers -->
    <div class="col-md-3">

        <div class="card shadow-sm text-center p-3">

            <h5>Offers</h5>

            <h2 id="offerCount">
                0
            </h2>

        </div>

    </div>

</div>

    <!-- Add Job Form -->
    <div class="card shadow-sm p-4">

        <h4 class="mb-4">
            Add Job Application
        </h4>

        <form id="addJobForm">

            <div class="mb-3">

                <label class="form-label">
                    Company Name
                </label>

                <input
                    type="text"
                    id="company_name"
                    class="form-control"
                    placeholder="Enter company name"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Job Title
                </label>

                <input
                    type="text"
                    id="job_title"
                    class="form-control"
                    placeholder="Enter job title"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Job Link
                </label>

                <input
                    type="url"
                    id="job_link"
                    class="form-control"
                    placeholder="Enter job link"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Status
                </label>

                <select
                    id="status"
                    class="form-select"
                >
                    <option value="Applied">Applied</option>
                    <option value="Interview">Interview</option>
                    <option value="Rejected">Rejected</option>
                    <option value="Offer">Offer</option>
                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Notes
                </label>

                <textarea
                    id="notes"
                    class="form-control"
                    rows="3"
                    placeholder="Add notes..."
                ></textarea>

            </div>

            <button
                type="submit"
                class="btn btn-primary"
            >
                Add Job
            </button>

        </form>

        <!-- Message Area -->
        <div
            id="jobMessage"
            class="mt-3"
        ></div>

    </div>
    <!-- Job Applications Table -->
<div class="card shadow-sm p-4 mt-4">

    <h4 class="mb-4">
        My Job Applications
    </h4>

    <div class="table-responsive">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>

                    <th>Company</th>

                    <th>Job Title</th>

                    <th>Status</th>

                    <th>Update Status</th>

                    <th>Applied Date</th>

                    <th>Notes</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="jobsTableBody">

                <!-- Dynamic Jobs -->

            </tbody>

        </table>

    </div>

</div>

</div>

<script src="/static/js/app.js"></script>

</body>

</html>
